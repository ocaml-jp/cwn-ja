name: Translate CWN
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      since:
        description: 'Translate issues from this date onward (YYYY.MM.DD)'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # Skip scheduled runs while a previous translation PR is still open, so we
  # don't pile up a new PR each day. Manual (workflow_dispatch) runs bypass the
  # guard — that's the escape hatch for forcing a run once the PR is merged.
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Skip if an open translation PR exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run: bypassing the open-PR guard."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          open=$(gh pr list --repo "${{ github.repository }}" \
            --label automated --state open --json number --jq 'length')
          if [ "$open" -gt 0 ]; then
            echo "An open translation PR already exists; skipping this run."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  translate:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Get current submodule SHA
        id: before
        run: echo "sha=$(git -C cwn-data rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Update submodule to latest upstream
        run: git submodule update --remote cwn-data

      - name: Get updated submodule SHA
        id: after
        run: echo "sha=$(git -C cwn-data rev-parse HEAD)" >> $GITHUB_OUTPUT

      # Install emacs before setup-dune: setup-dune@v2 runs `dune build`
      # at the end of its setup, which needs emacs for the org → html rules.
      - name: Install emacs
        run: sudo apt-get install -y emacs-nox

      - name: Set up dune
        uses: ocaml-dune/setup-dune@v2

      - name: Run translation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -n "${{ inputs.since }}" ]; then
            ARGS="-since ${{ inputs.since }}"
          else
            ARGS="-from-ref ${{ steps.before.outputs.sha }} -to-ref ${{ steps.after.outputs.sha }}"
          fi
          dune exec cwn_ja -- translate $ARGS

      # Two passes: the first regenerates ja/dune.inc from the new *.xml glob,
      # the second uses the refreshed rules to build org/rss/html and the
      # aggregators. Both promote outputs back into ja/.
      - name: Build site
        run: |
          dune build
          dune build

      - name: Create PR (if there are changes)
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          title: "translate: add Japanese CWN translations (${{ github.run_id }})"
          branch: auto-translate/${{ github.run_id }}
          commit-message: "translate: add new Japanese CWN translations"
          body: "Automated Japanese translations of new CWN issues via OpenRouter."
          labels: translation, automated

      # peter-evans/create-pull-request restores the working tree to the base
      # branch after pushing, so ja/ here no longer contains the translated
      # files. Check out the PR's commit so the preview action sees the right
      # content.
      - name: Check out PR branch for preview
        if: steps.cpr.outputs.pull-request-number
        run: git checkout ${{ steps.cpr.outputs.pull-request-head-sha }}

      # Deploys here rather than from preview.yml because PRs created by
      # GITHUB_TOKEN don't trigger pull_request workflows. HTML is already
      # built by the dune build step above.
      - name: Deploy PR preview
        if: steps.cpr.outputs.pull-request-number
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./ja/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: deploy
          pr-number: ${{ steps.cpr.outputs.pull-request-number }}

      # rossjrw/pr-preview-action wraps marocchino/sticky-pull-request-comment,
      # which infers the PR number from github.event.pull_request — undefined
      # in a scheduled context — so its comment step silently no-ops. Post the
      # link ourselves.
      - name: Comment preview link
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" \
            --body ":rocket: Preview: https://ocaml.jp/cwn-ja/pr-preview/pr-${PR_NUMBER}/"
