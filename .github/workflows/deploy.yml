name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: [ja/**]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # keep_files: true preserves the pr-preview/ directory that
      # rossjrw/pr-preview-action writes to this same branch. Side-effect:
      # files deleted from ja/ on main linger on gh-pages until cleaned by
      # hand. If that becomes a problem, replace this step with a manual
      # checkout-of-gh-pages + rsync that explicitly preserves pr-preview/.
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ja
          keep_files: true
